name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write # required for GitHub OIDC -> AWS role assumption
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build server
        working-directory: server
        run: |
          npm ci
          npx prisma generate
      - name: Install & build client
        working-directory: client
        run: |
          npm ci
          npm run build

  build-ami:
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      ami_id: ${{ steps.packer_output.outputs.ami_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-packer@v3

      - name: Packer init
        working-directory: packer
        run: packer init app.pkr.hcl

      - name: Packer build
        working-directory: packer
        run: |
          packer build \
            -var "aws_region=${{ env.AWS_REGION }}" \
            -var "app_git_ref=${{ github.sha }}" \
            -var "app_repo_url=https://github.com/${{ github.repository }}.git" \
            app.pkr.hcl | tee packer_output.log

      - name: Extract AMI ID
        id: packer_output
        working-directory: packer
        run: |
          AMI_ID=$(grep -o 'ami-[a-z0-9]*' packer_output.log | tail -1)
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"

  terraform-apply:
    needs: build-ami
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init

      - run: terraform plan -out=tfplan -var "ami_id=${{ needs.build-ami.outputs.ami_id }}"
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - run: terraform apply -auto-approve tfplan

  instance-refresh:
    needs: [build-ami, terraform-apply]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger ASG instance refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name vibeventure-asg \
            --preferences '{"MinHealthyPercentage": 50}'
